name: VsixPackage

on:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # Node 20 hits end-of-life in April 2026; 22.x is the
          # current Active LTS. Matches the engines hint we pin in
          # devcontainer / local dev.
          node-version: 22.x
      - run: npm install
      - name: Verify (version + CHANGELOG match)
        run: npm run check-version
      - name: Verify (typecheck)
        run: npm run typecheck
      - name: Verify (tests + coverage)
        run: npm run test:coverage
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - run: npm run build
      - name: Publish
        if: success() && startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        run: npm run deploy
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
